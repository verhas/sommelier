<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 140" width="560" height="140">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="100%" stop-color="#e0821e"/>
    </linearGradient>
    <linearGradient id="gold-dark" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#e0901e"/>
      <stop offset="100%" stop-color="#c46a10"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="560" height="140" rx="14" fill="url(#bg)"/>
  <rect width="560" height="140" rx="14" fill="none" stroke="#e0821e" stroke-width="1.5" opacity="0.4"/>

  <!-- Icon badge -->
  <rect x="10" y="10" width="120" height="120" rx="12" fill="#0f0f23"/>
  <rect x="10" y="10" width="120" height="120" rx="12" fill="none" stroke="#f6d365" stroke-width="1" opacity="0.4"/>

  <!-- Croissant body — main golden crescent -->
  <path d="M 36,82
           C 28,62 34,36 52,27
           C 68,19 84,26 89,41
           C 76,32 61,34 54,47
           C 47,60 51,76 63,84
           C 51,90 40,88 36,82 Z"
        fill="url(#gold)"/>

  <!-- Croissant right horn / darker end -->
  <path d="M 89,41
           C 97,55 95,71 86,80
           C 77,89 64,91 54,84
           C 66,83 76,76 80,65
           C 84,54 81,41 72,34
           C 78,32 86,35 89,41 Z"
        fill="url(#gold-dark)"/>

  <!-- Croissant highlight lines (flaky layers) -->
  <path d="M 44,75 C 41,58 47,40 60,32"
        stroke="#f8e58a" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.55"/>
  <path d="M 53,79 C 51,63 55,47 66,37"
        stroke="#f8e58a" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.3"/>

  <!-- Decorative Jinja2 braces in icon corners -->
  <text x="14" y="36" font-family="'Courier New',monospace" font-size="15"
        fill="#f6d365" opacity="0.4">{{</text>
  <text x="88" y="122" font-family="'Courier New',monospace" font-size="15"
        fill="#f6d365" opacity="0.4">}}</text>

  <!-- Separator -->
  <line x1="143" y1="22" x2="143" y2="118" stroke="#e0821e" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Title: Patisserie -->
  <text x="160" y="83"
        font-family="Georgia,'Times New Roman',serif"
        font-size="54" font-weight="bold"
        fill="white" letter-spacing="-1"
        filter="url(#glow)">P&#xe2;tisserie</text>

  <!-- Tagline -->
  <text x="163" y="108"
        font-family="'Courier New',Courier,monospace"
        font-size="13" fill="#e0921e" letter-spacing="0.5">pati  ·  language-agnostic code generator</text>
</svg>
