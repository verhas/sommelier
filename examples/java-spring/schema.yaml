template_dir: templates

shared: &base_package
  package: com.example.demo

jobs:
  - template: entity.java.j2
    output: generated/Entity.java
    context:
      <<: *base_package
      entity_name: User
      table_name: users
      fields:
        - name: id
          type: Long
          annotation: "@Id @GeneratedValue"
        - name: username
          type: String
          annotation: "@Column(nullable = false, unique = true)"
        - name: email
          type: String
          annotation: "@Column(nullable = false)"
        - name: created_at
          type: LocalDateTime
          annotation: "@CreationTimestamp"

  - template: dto.java.j2
    output: generated/UserDTO.java
    context:
      <<: *base_package
      dto_name: UserDTO
      fields:
        - name: id
          type: Long
        - name: username
          type: String
        - name: email
          type: String

  - template: repository.java.j2
    output: generated/UserRepository.java
    context:
      <<: *base_package
      entity_name: User
      entity_type: User
      id_type: Long

  - template: liquibase.xml.j2
    output: generated/changelog.xml
    context:
      changelog_id: "001-create-users-table"
      table_name: users
      columns:
        - name: id
          type: BIGINT
          constraints: "primaryKey=true autoIncrement=true"
        - name: username
          type: VARCHAR(255)
          constraints: "nullable=false unique=true"
        - name: email
          type: VARCHAR(255)
          constraints: "nullable=false"
        - name: created_at
          type: TIMESTAMP
